<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MAHOLA SCHOOL</title>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   MAHOLA SCHOOL — Design system (Claude Design v1)
   Palette: #FFD700 jaune·or | #4ECDC4 teal | #FF6B6B coral
            #9B59B6 violet | #FF9500 orange | #FFFDF5 fond
   Typo: Fredoka One (titres) + Nunito (texte)
═══════════════════════════════════════════════════ */
:root{
  --yellow:#FFD700; --yellow2:#FF9500; --yellow-bg:#FFF5CC; --yellow-light:#FFFCE0;
  --teal:#4ECDC4;   --teal2:#2BBDB3;  --teal-bg:#E0FEFA;   --teal-dark:#0D9488;
  --coral:#FF6B6B;  --coral2:#EF4444; --coral-bg:#FFE8E8;  --coral-dark:#c23a3a;
  --violet:#9B59B6; --violet2:#8B5CF6;--violet-bg:#EEE0FF; --violet-dark:#7a3c99;
  --orange:#FF9500; --orange-bg:#FFE8CC;
  --navy:#4A2080;   --navy2:#2E6FC4;
  --green:#2E9E2E;  --green-bg:#D4F5D4;
  --bg:#FFFDF5; --white:#fff; --dark:#333; --muted:#888; --border:#EBEBEB;
  --card-radius:20px;
  --font-title:'Fredoka One',cursive;
  --font-body:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--dark);font-size:14px;}
#app{min-height:100vh;}

/* ── HEADER ── */
.hdr{background:linear-gradient(155deg,var(--yellow) 0%,var(--yellow2) 100%);position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;top:-30px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.12);border-radius:50%;}
.hdr::after{content:'';position:absolute;bottom:-20px;left:20px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%;}
.hdr-inner{max-width:1140px;margin:0 auto;padding:18px 24px 20px;display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.hdr-logo{width:48px;height:48px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:3px 3px 0 rgba(0,0,0,.15);}
.hdr-info h1{font-family:var(--font-title);font-size:26px;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,.12);line-height:1;}
.hdr-info p{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);margin-top:2px;}
.hdr-sync{margin-left:auto;font-size:11px;font-weight:700;color:rgba(51,51,51,.75);display:flex;align-items:center;gap:5px;flex-shrink:0;background:rgba(255,255,255,.5);padding:5px 10px;border-radius:20px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2E9E2E;display:inline-block;flex-shrink:0;}
.sync-dot.saving{background:var(--orange);}
.sync-dot.error{background:var(--coral);}

/* ── NAV ── */
.nav-wrap{background:var(--bg);padding:12px 24px 0;border-bottom:2.5px solid var(--border);}
.nav-inner{max-width:1140px;margin:0 auto;display:flex;gap:6px;background:#fff;border-radius:16px;padding:5px;border:2px solid var(--dark);box-shadow:0 6px 18px rgba(0,0,0,.08);}
.nav-btn{flex:1;text-align:center;padding:10px 6px;border-radius:12px;font:800 11px var(--font-body);color:var(--muted);white-space:nowrap;cursor:pointer;border:none;background:none;transition:all .15s;}
.nav-btn.active{background:var(--yellow);color:var(--dark);font-weight:900;}
.nav-btn:hover:not(.active){background:#f4f4f4;}
.nav-btn .nb{display:inline-block;background:var(--coral);color:#fff;border-radius:10px;font-size:9px;font-weight:800;padding:1px 6px;margin-left:4px;vertical-align:middle;}

/* ── MAIN ── */
.main{max-width:1140px;margin:0 auto;padding:20px 20px 60px;}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--card-radius);padding:18px 20px;margin-bottom:14px;border:2.5px solid var(--border);box-shadow:3px 3px 0 rgba(0,0,0,.06);}
.card-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.card-head h2{font-family:var(--font-body);font-size:15px;font-weight:900;color:var(--dark);}
.card-sub{font-size:11.5px;color:var(--muted);margin-top:2px;font-weight:600;}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.metric{background:#fff;border-radius:18px;padding:14px 16px;border:2.5px solid var(--border);box-shadow:3px 3px 0 rgba(0,0,0,.06);}
.metric .lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.metric .val{font-family:var(--font-title);font-size:24px;color:var(--dark);line-height:1;}
.metric .val.gold{color:var(--orange);}
.metric .val.green{color:var(--green);}
.metric .val.red{color:var(--coral);}

/* ── BUTTONS ── */
.btn{border:2px solid var(--dark);background:#fff;color:var(--dark);padding:8px 14px;border-radius:12px;font:800 12px var(--font-body);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;box-shadow:2px 2px 0 rgba(0,0,0,.15);}
.btn:hover{background:var(--yellow-bg);transform:translateY(-1px);}
.btn.primary{background:var(--dark);color:#fff;border-color:var(--dark);box-shadow:3px 3px 0 rgba(0,0,0,.3);}
.btn.primary:hover{background:#444;}
.btn.gold{background:var(--yellow);color:var(--dark);border-color:var(--dark);font-weight:900;box-shadow:3px 3px 0 rgba(0,0,0,.2);}
.btn.gold:hover{background:var(--yellow2);color:#fff;}
.btn.danger{color:var(--coral);border-color:var(--coral);box-shadow:2px 2px 0 rgba(239,68,68,.2);}
.btn.danger:hover{background:var(--coral-bg);}
.btn.sm{padding:5px 10px;font-size:11px;border-radius:10px;box-shadow:2px 2px 0 rgba(0,0,0,.12);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* ── INPUTS ── */
input[type=text],input[type=number],input[type=date],select,textarea{
  border:2px solid var(--border);border-radius:12px;padding:9px 12px;
  font:700 13px var(--font-body);color:var(--dark);background:#fff;width:100%;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,215,0,.2);}
label.lbl{font:700 11px var(--font-body);color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
.field{margin-bottom:12px;}
.field2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filters input[type=text]{flex:1;min-width:160px;width:auto;}
.filters select{width:auto;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;}
table.tbl th{text-align:left;padding:9px 10px;color:var(--muted);font-weight:800;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2.5px solid var(--border);white-space:nowrap;background:#fafafa;}
table.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.tbl tr:last-child td{border-bottom:none;}
table.tbl tr:hover td{background:var(--yellow-light);}
table.tbl tfoot td{font-weight:800;background:var(--yellow-light);border-top:2px solid var(--yellow);}

/* ── BADGES ── */
.badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge.blue{background:var(--teal-bg);color:var(--teal-dark);border:1.5px solid var(--teal);}
.badge.gold{background:var(--yellow-light);color:#996600;border:1.5px solid #FFD93D;}
.badge.green{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green);}
.badge.red{background:var(--coral-bg);color:var(--coral-dark);border:1.5px solid var(--coral);}
.badge.gray{background:#f4f4f4;color:var(--muted);border:1.5px solid var(--border);}

/* ── BARS ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px;}
.bar-lbl{width:190px;flex-shrink:0;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;}
.bar-track{flex:1;height:10px;background:#f0f0f0;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);}
.bar-fill{height:100%;border-radius:8px;background:var(--teal);}
.bar-fill.gold{background:var(--yellow2);}
.bar-fill.green{background:var(--green);}
.bar-val{width:40px;text-align:right;color:var(--dark);font-size:12px;font-weight:800;flex-shrink:0;}

/* ── TOGGLE ── */
.toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle .slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.15s;border:2px solid #999;}
.toggle .slider:before{content:"";position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.15s;}
.toggle input:checked + .slider{background:var(--teal);border-color:var(--teal-dark);}
.toggle input:checked + .slider:before{transform:translateX(16px);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(51,51,51,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:#fff;border-radius:22px;padding:22px 24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;border:2.5px solid var(--dark);box-shadow:4px 4px 0 rgba(0,0,0,.2);}
.modal h3{margin:0 0 16px;color:var(--dark);font:900 17px var(--font-body);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:2px solid var(--border);}

/* ── SETUP SCREEN ── */
.setup-wrap{max-width:560px;margin:60px auto;padding:0 20px;}
.setup-wrap .logo-big{width:60px;height:60px;border-radius:16px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:3px 3px 0 rgba(0,0,0,.2);}

/* ── ALERTS ── */
.alert{border-radius:14px;padding:11px 15px;font-size:13px;font-weight:700;margin-bottom:12px;border:2px solid;}
.alert.warn{background:var(--yellow-light);color:#996600;border-color:#FFD93D;}
.alert.err{background:var(--coral-bg);color:var(--coral-dark);border-color:var(--coral);}
.alert.info{background:var(--teal-bg);color:var(--teal-dark);border-color:var(--teal);}
.alert.ok{background:var(--green-bg);color:var(--green);border-color:var(--green);}

/* ── PROGRESS BAR ── */
.budget-progress{height:10px;background:#f0f0f0;border-radius:8px;overflow:hidden;margin-top:6px;border:1.5px solid var(--border);}
.budget-progress .fill{height:100%;border-radius:8px;background:var(--teal);transition:width .3s;}
.budget-progress .fill.warn{background:var(--yellow2);}
.budget-progress .fill.over{background:var(--coral);}

/* ── SECTION SEP ── */
.section-sep{font:800 10px var(--font-body);text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:14px 0 8px;border-bottom:2px solid var(--border);margin-bottom:4px;}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;background:var(--bg);}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer{text-align:center;font:700 11.5px var(--font-body);color:var(--muted);padding:16px;border-top:2px solid var(--border);margin-top:10px;}
.footer a{color:var(--teal-dark);text-decoration:none;font-weight:800;}

/* ── PRINT ── */
@media print{.hdr,.nav-wrap,.no-print{display:none!important;} body{background:#fff;} .card{border:1px solid #ddd;box-shadow:none;} .main{padding:0;}}
@media(max-width:700px){.field2,.field3{grid-template-columns:1fr;} .hdr-sync{display:none;} table.tbl{font-size:12px;} .nav-btn{font-size:10px;padding:8px 3px;} }
</style>

  if(n<=3) return "≤ 3 ans"; if(n<=7) return "4–7 ans"; if(n<=14) return "8–14 ans"; return "15 ans et +";
}
function normalizeClasse(raw){
  const s=norm(raw); if(!s) return "";
  if(/UNIVERSIT/.test(s)) return "univ";
  if(/LICENCE\s*1/.test(s)) return "licence1";
  if(/LICENCE\s*2/.test(s)) return "licence2";
  if(/LICENCE\s*3/.test(s)) return "licence3";
  if(/MASTER\s*1/.test(s)) return "master1";
  if(/MASTER\s*2/.test(s)) return "master2";
  if(/MASTER/.test(s)) return "master1";
  if(/LICENCE/.test(s)) return "licence1";
  if(/SIL/.test(s)) return "sil";
  if(/^CP\b/.test(s)) return "cp";
  if(/CE1/.test(s)) return "ce1"; if(/CE2/.test(s)) return "ce2";
  if(/CM1/.test(s)) return "cm1"; if(/CM2/.test(s)) return "cm2";
  if(/\b6\s?E(ME)?\b/.test(s)) return "6e"; if(/\b5\s?E(ME)?\b/.test(s)) return "5e";
  if(/\b4\s?E(ME)?\b/.test(s)) return "4e"; if(/\b3\s?E(ME)?\b/.test(s)) return "3e";
  // Lycée francophone - séries officielles camerounaises
  // Lycée technique francophone (series F1-F4, TI, STT, SMS)
  function techSerie(s){
    if(/\bF1\b/.test(s)||/GENIE CIVIL/.test(s)) return "f1";
    if(/\bF2\b/.test(s)||/GENIE MEC/.test(s)) return "f2";
    if(/\bF3\b/.test(s)||/GENIE ELEC/.test(s)||/ELECTRO/.test(s)) return "f3";
    if(/\bF4\b/.test(s)||/GESTION/.test(s)||/COMMERCE/.test(s)||/COMPTA/.test(s)) return "f4";
    if(/\bTI\b/.test(s)||/INFORMATIQUE/.test(s)) return "ti";
    if(/\bSTT\b/.test(s)||/TERTIAIRES/.test(s)) return "stt";
    if(/\bSMS\b/.test(s)||/MEDICO/.test(s)||/SOCIALE/.test(s)) return "sms";
    return null;
  }
  if(/TERMINALE/.test(s)||/\bTLE\b/.test(s)){
    const ts=techSerie(s); if(ts) return "tle_"+ts;
    if(/\bA\b/.test(s)||/LITT/.test(s)) return "tlea";
    if(/\bC\b/.test(s)) return "tlec";
    if(/\bD\b/.test(s)) return "tled";
    return "tles";
  }
  if(/\bSECONDE\b/.test(s)||/\b2ND/.test(s)||/\b2NDE\b/.test(s)){
    const ts=techSerie(s); if(ts) return "2nde_"+ts;
    if(/\bA\b/.test(s)||/LITT/.test(s)) return "2nda";
    if(/\bC\b/.test(s)) return "2ndc";
    if(/\bD\b/.test(s)) return "2ndd";
    if(/LITT/.test(s)) return "2ndl";
    return "2nds";
  }
  if(/\b1ERE\b/.test(s)||/PREMIERE/.test(s)){
    if(/ANGLOPHONE/.test(s)) return "";
    const ts=techSerie(s); if(ts) return "1ere_"+ts;
    if(/\bA\b/.test(s)||/LITT/.test(s)) return "1erea";
    if(/\bC\b/.test(s)) return "1erec";
    if(/\bD\b/.test(s)) return "1ered";
    return "1eres";
  }
  // Anglophone classes
  let m=s.match(/\bCLASS\s?(ONE|TWO|THREE|FOUR|FIVE|SIX|[1-6])\b/);
  if(m){ const mn={ONE:"1",TWO:"2",THREE:"3",FOUR:"4",FIVE:"5",SIX:"6"}; const n=mn[m[1]]||m[1];
    return ["1","2","3","4","5","6"].includes(n)?"class"+n:""; }
  m=s.match(/\bFORM\s?([1-5])\b/)||s.match(/\bFROM\s?([1-5])\b/);
  if(m){ return "form"+m[1]; }
  if(/UPPER\s*SIXTH/.test(s)||/UPPER\s*6/.test(s)) return "upper6";
  if(/LOWER\s*SIXTH/.test(s)||/LOWER\s*6/.test(s)) return "lower6";
  if(/NURSERY\s*1/.test(s)||/N1\b/.test(s)) return "nursery1";
  if(/NURSERY\s*2/.test(s)||/N2\b/.test(s)) return "nursery2";
  if(/NURSERY/.test(s)) return "nursery1";
  if(/GRANDE\s*SECTION/.test(s)) return "gs"; if(/MOYENNE\s*SECTION/.test(s)) return "ms"; if(/PETITE\s*SECTION/.test(s)) return "ps";
  if(/PRE\s?MATERNELLE/.test(s)||/MATERNELLE\s*ANGLOPHONE/.test(s)) return "mat_ang";
  return "";
}

function initFB(){
  if(firebase.apps&&firebase.apps.length) firebase.apps.forEach(a=>{ try{a.delete();}catch(e){} });
  firebase.initializeApp(FIREBASE_CFG);
  db=firebase.firestore();
}
function doc(name){ return db.collection("mahola").doc(name); }
async function fsGet(name){ try{ const s=await doc(name).get(); return s.exists?s.data():null; }catch(e){ throw e; } }
async function fsSet(name,payload){ try{ await doc(name).set({payload,u:Date.now()}); return true; }catch(e){ return false; } }

function setSync(status){
  S.syncStatus=status;
  const dot=$("sync-dot"), txt=$("sync-txt");
  if(dot){ dot.className="sync-dot"+(status==="saving"?" saving":status==="error"?" error":""); }
  if(txt){ txt.textContent=status==="saving"?"Sauvegarde…":status==="error"?"Erreur de sync":"Synchronisé"; }
}

function subscribeRT(){
  if(!db) return;
  rtSubs.forEach(u=>u()); rtSubs=[];
  const keys=[["enfants","enfants"],["catalogue","catalogue"],["prixref","prixref"],["meta","meta"]];
  keys.forEach(([skey,fskey])=>{
    const unsub=doc(fskey).onSnapshot(snap=>{
      if(snap.exists){ S[skey]=snap.data().payload; if(!S.modal) render(); }
    },e=>console.error(e));
    rtSubs.push(unsub);
  });
}

async function loadAll(){
  const [e,c,p,m]=await Promise.all([fsGet("enfants"),fsGet("catalogue"),fsGet("prixref"),fsGet("meta")]);
  S.enfants  =(e&&e.payload)?e.payload:ENFANTS_DEFAULT.map(x=>Object.assign({},x));
  S.catalogue=(c&&c.payload)?c.payload:CATALOGUE_DEFAULT.map(x=>Object.assign({},x));
  S.prixref  =(p&&p.payload)?p.payload:PRIXREF_DEFAULT.map(x=>Object.assign({},x));
  S.meta     =(m&&m.payload)?m.payload:{anneeScolaire:"2026-2027",budgetGlobal:0};
  const writes=[];
  if(!e||!e.payload) writes.push(fsSet("enfants",S.enfants));
  if(!c||!c.payload) writes.push(fsSet("catalogue",S.catalogue));
  if(!p||!p.payload) writes.push(fsSet("prixref",S.prixref));
  if(!m||!m.payload) writes.push(fsSet("meta",S.meta));
  if(writes.length) await Promise.all(writes);
  subscribeRT();
}

let __booted=false;
let S_demoMode=false;

async function boot(){
  try{
    initFB();
    await loadAll();
    S_demoMode=false; S.loading=false; __booted=true;
    render();
  } catch(err){
    // Firebase indisponible (ex: aperçu iframe) → mode démo local
    console.warn("Firebase indisponible, mode démo :", err.message);
    S_demoMode=true;
    S.enfants  =ENFANTS_DEFAULT.map(x=>Object.assign({},x));
    S.catalogue=CATALOGUE_DEFAULT.map(x=>Object.assign({},x));
    S.prixref  =PRIXREF_DEFAULT.map(x=>Object.assign({},x));
    S.meta     ={anneeScolaire:"2026-2027",budgetGlobal:0};
    S.setupErr ="Connexion Firebase temporairement indisponible. L'application fonctionne en mode local.";
    S.loading=false; __booted=true;
    render();
  }
}

async function mutate(key,fskey,newData){
  setSync("saving");
  S[key]=newData;
  if(!S_demoMode && db){
    const ok=await fsSet(fskey,newData);
    setSync(ok?"ok":"error");
  } else {
    setSync("demo");
  }
  render();
}

function forceDefault(why){
  if(__booted) return; __booted=true; S_demoMode=true;
  S.enfants  =ENFANTS_DEFAULT.map(x=>Object.assign({},x));
  S.catalogue=CATALOGUE_DEFAULT.map(x=>Object.assign({},x));
  S.prixref  =PRIXREF_DEFAULT.map(x=>Object.assign({},x));
  S.meta={anneeScolaire:"2026-2027",budgetGlobal:0};
  S.loading=false; S.needsSetup=false;
  console.error("Boot fallback:",why); render();
}

function getFilteredEnfants(){
  const f=S.eFilter;
  return S.enfants.filter(e=>{
    if(f.onlyUnclassed&&e.classe) return false;
    if(f.classe&&e.classe!==f.classe) return false;
    if(f.sexe&&e.sexe!==f.sexe) return false;
    if(f.search){ const s=norm(f.search); const h=norm((e.nom||"")+" "+(e.parent||"")); if(!h.includes(s)) return false; }
    return true;
  }).sort((a,b)=>(a.nom||"").localeCompare(b.nom||""));
}

// Compile all articles to buy: aggregate by article name across all classes × nb children
function compileListeAchats(){
  const map={};
  S.catalogue.forEach(c=>{
    const nb=S.enfants.filter(e=>e.classe===c.key).length;
    if(!nb) return;
    const arts=c.articles||[];
    arts.forEach(a=>{
      if(!a.nom||!a.nom.trim()) return;
      const k=a.nom.trim().toLowerCase().replace(/\s+/g,' ');
      const qte=(Number(a.quantite)||1)*nb;
      const pu=Number(a.prixUnitaire)||0;
      if(!map[k]){ map[k]={nom:a.nom.trim(),quantiteTotal:0,prixUnitaire:pu,classes:[]}; }
      map[k].quantiteTotal+=qte;
      if(pu>0&&map[k].prixUnitaire===0) map[k].prixUnitaire=pu;
      if(!map[k].classes.includes(c.classe)) map[k].classes.push(c.classe);
    });
  });
  return Object.values(map).sort((a,b)=>a.nom.localeCompare(b.nom));
}

// Build per-class packages: [{classeKey, classeLabel, groupe, articles[], enfants[], pkgPrice}]
function buildPackagesParClasse(){
  const result=[];
  GROUP_ORDER.forEach(g=>{
    S.catalogue.filter(c=>c.groupe===g).forEach(c=>{
      const enfants=S.enfants.filter(e=>e.classe===c.key).sort((a,b)=>(a.nom||"").localeCompare(b.nom||""));
      if(!enfants.length) return;
      const articles=c.articles||[];
      const pkgPrice=packagePrice({classe:c.key});
      result.push({key:c.key, label:c.classe, groupe:c.groupe, filiere:c.filiere||"", articles, enfants, pkgPrice});
    });
  });
  return result;
}

function openRowPicker(i){

  S.modal.editRow   = i;

function selectArtForRow(i, code, nom, categorie){
  if(!S.modal||!S.modal.arts) return;
  S.modal.arts[i] = Object.assign({}, S.modal.arts[i], {code, nom, categorie});
  S.modal.editRow   = null;
  S.modal.rowSearch = '';
  S.modal.rowCat    = '';
  render();
}

function pickArt(code, nom, categorie){
  // kept for backwards compatibility — now unused
  if(!S.modal||!S.modal.arts) return;
  if(!S.modal.arts.some(a=>a.code===code)){
    S.modal.arts.push({code, nom, categorie, quantite:1, prixUnitaire:0});
    render();
  }
}

function calcClassePrix(articles){
  return (articles||[]).reduce((s,a)=>s+(Number(a.prixUnitaire)||0)*(Number(a.quantite)||1),0);
}

function artField(i, field, val){
  if(!S.modal || !S.modal.arts) return;
  const parsed = field==="nom" ? val : (Number(val)||0);
  S.modal.arts[i][field] = parsed;

  if(field==="prixUnitaire"){
    const code = S.modal.arts[i].code;
    if(code){
      // 1. Propager dans les autres lignes du modal en cours
      S.modal.arts.forEach((a,j)=>{
        if(j!==i && a.code===code) a.prixUnitaire=parsed;
      });
      // 2. Propager dans tout le catalogue + recalculer le prix de chaque classe
      const newCat = S.catalogue.map(c=>{
        if(!c.articles) return c;
        let changed=false;
        const updated = c.articles.map(a=>{
          if(a.code===code && a.prixUnitaire!==parsed){
            changed=true;
            return Object.assign({},a,{prixUnitaire:parsed});
          }
          return a;
        });
        if(!changed) return c;
        // Recalculer le sous-total de la classe
        const newPrix = calcClassePrix(updated);
        return Object.assign({},c,{articles:updated, prix:newPrix});
      });
      S.catalogue = newCat;
      if(!S_demoMode && db) fsSet("catalogue", newCat).then(()=>setSync("ok")).catch(()=>setSync("error"));
      else setSync("demo");
    }
  }

  render();
}

function removeArt(i){
  if(!S.modal || !S.modal.arts) return;
  if(S.modal.editRow===i) S.modal.editRow=null;
  else if(S.modal.editRow>i) S.modal.editRow--;
  S.modal.arts.splice(i,1);
  render();
}

function addArt(){
  if(!S.modal) return;
  if(!S.modal.arts) S.modal.arts=[];
  S.modal.arts.push({code:'', nom:'Nouvel article', categorie:'', quantite:1, prixUnitaire:0});
  S.modal.editRow = S.modal.arts.length-1; // open picker on newly added row
  S.modal.rowSearch=''; S.modal.rowCat='';
  render();
}

function saveCatalogueArticles(key){
  const arts = (S.modal && S.modal.arts) ? S.modal.arts : [];

  // Dictionnaire code → prixUnitaire (inclut les 0)
  const priceByCode = {};
  arts.forEach(a=>{ if(a.code) priceByCode[a.code]=Number(a.prixUnitaire)||0; });

  const newCat = S.catalogue.map(c=>{
    if(c.key===key){
      // Classe éditée : remplacer les articles et recalculer le prix
      const total = calcClassePrix(arts);
      return Object.assign({},c,{articles:arts, prix:total});
    }
    if(!c.articles || !Object.keys(priceByCode).length) return c;
    let changed=false;
    const updated = c.articles.map(a=>{
      if(a.code && a.code in priceByCode && a.prixUnitaire!==priceByCode[a.code]){
        changed=true;
        return Object.assign({},a,{prixUnitaire:priceByCode[a.code]});
      }
      return a;
    });
    if(!changed) return c;
    // Recalculer le sous-total de chaque classe affectée
    return Object.assign({},c,{articles:updated, prix:calcClassePrix(updated)});
  });

  S.modal = null;
  mutate("catalogue","catalogue",newCat);
}

  packages.forEach(pkg=>{
    // Ligne entête classe
    distRows.push([pkg.label, pkg.groupe, pkg.filiere, pkg.enfants.length, pkg.pkgPrice, pkg.pkgPrice*pkg.enfants.length,"","",""]);
    // Ligne articles du package

    distRows.push(["  Articles :",artStr,"","","","","","",""]);

  // Onglet 3 : Recensement enfants
  const enf=[["Nom","Sexe","Âge","Classe","Filière","Groupe","Parent","Ville","Année scolaire","Package (FCFA)","Statut","Date remise"]];
  S.enfants.slice().sort((a,b)=>(a.nom||"").localeCompare(b.nom||"")).forEach(e=>{
    const c=catByKey(e.classe);
    enf.push([e.nom,e.sexe==="F"?"Fille":e.sexe==="M"?"Garçon":"",e.age,classeLabel(e.classe),c?c.filiere:"",c?c.groupe:"",e.parent,e.ville,e.anneeScolaire,packagePrice(e),e.distribue?"Distribué":"En attente",e.dateDistribution||""]);
  });
  const wsEnf=XLSX.utils.aoa_to_sheet(enf);
  wsEnf['!cols']=[{wch:32},{wch:8},{wch:6},{wch:20},{wch:8},{wch:24},{wch:30},{wch:14},{wch:12},{wch:16},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsEnf,"Enfants");

  // Onglet 4 : Budget par classe
  const bud=[["Groupe","Classe","Filière","Nb enfants","Prix package (FCFA)","Sous-total (FCFA)","Objectif (FCFA)","Écart (FCFA)"]];
  S.catalogue.forEach(c=>{
    const nb=S.enfants.filter(e=>e.classe===c.key).length;
    if(!nb) return;
    const prix=packagePrice({classe:c.key});
    const st=nb*prix;
    const bo=Number(c.budgetObjectif)||0;
    bud.push([c.groupe,c.classe,c.filiere,nb,prix,st,bo||"",bo>0?st-bo:""]);
  });
  const totalB=S.enfants.reduce((s,e)=>s+packagePrice(e),0);
  bud.push(["","TOTAL","","","",totalB,"",""]);
  const wsBud=XLSX.utils.aoa_to_sheet(bud);
  wsBud['!cols']=[{wch:22},{wch:22},{wch:8},{wch:12},{wch:18},{wch:18},{wch:18},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsBud,"Budget");

  // Onglet 5 : Catalogue fournitures
  const cat=[["Classe","Groupe","Filière","Article","Quantité","Prix unitaire (FCFA)","Total article (FCFA)"]];
  S.catalogue.forEach(c=>{
    const arts=c.articles||[];
    if(arts.length){
      arts.forEach(a=>{ cat.push([c.classe,c.groupe,c.filiere,a.nom,a.quantite||1,Number(a.prixUnitaire)||0,(Number(a.prixUnitaire)||0)*(Number(a.quantite)||1)]); });
    } else if(c.fournitures){
      cat.push([c.classe,c.groupe,c.filiere,c.fournitures,1,0,0]);
    }
  });
  const wsCat=XLSX.utils.aoa_to_sheet(cat);
  wsCat['!cols']=[{wch:22},{wch:22},{wch:8},{wch:42},{wch:10},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb,wsCat,"Catalogue fournitures");

  XLSX.writeFile(wb,"MAHOLA_SCHOOL_"+date+".xlsx");
}

/* ===== PDF GENERATOR (zero external dependencies) ===== */
/*
  Minimal PDF writer that produces a valid PDF 1.4 document entirely in JS.
  Supports: text, rectangles, lines, multiple pages, A4 portrait.
  Output is a Blob downloaded via a <a> click — no popup, no window.open.
*/
/* ===== PDF EXPORT — HTML Blob + data URI (aucune dépendance, encodage parfait) ===== */
function exportPDF(){
  const packages   = buildPackagesParClasse();
  const listeAchats = compileListeAchats();
  const totalAch   = listeAchats.reduce((s,a)=>s+a.prixUnitaire*a.quantiteTotal, 0);
  const annee      = S.meta.anneeScolaire || '';
  const dateExport = new Date().toLocaleDateString('fr-FR');

  /* ── CSS embarqué ───────────────────────────────────────────────────────── */
  const css = `
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#1a1714;background:#fff;}
h1{font-size:16px;font-weight:700;color:#1c3350;margin-bottom:4px;}
h2{font-size:13px;font-weight:700;color:#1c3350;margin-bottom:4px;}
h3{font-size:10px;font-weight:700;color:#1c3350;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
p.sub{font-size:10px;color:#7a7060;margin-bottom:10px;}
.page{padding:14mm 12mm;page-break-after:always;}
.page:last-child{page-break-after:auto;}
.page-header{background:#1c3350;color:#fff;padding:8px 12px;margin:-14mm -12mm 12px;display:flex;justify-content:space-between;align-items:center;}
.page-header strong{font-size:12px;letter-spacing:.5px;}
.page-header span{font-size:9.5px;color:#b0c4e0;}
.page-footer{margin-top:10px;padding-top:6px;border-top:1px solid #e2d9c8;font-size:9px;color:#aaa;text-align:center;}
table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px;}
thead th{background:#1c3350;color:#fff;padding:5px 6px;text-align:left;font-size:9.5px;}
thead th.r{text-align:right;}
tbody tr:nth-child(even){background:#f5f2ec;}
tbody td{padding:4px 6px;border-bottom:.5px solid #e5e0d4;}
tbody td.r{text-align:right;}
tfoot td{background:#fdf1de;font-weight:700;padding:5px 6px;border-top:1.5px solid #c8c0a8;}
tfoot td.r{text-align:right;}
.pkg-header{background:#1c3350;color:#fff;padding:8px 12px;border-radius:5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.pkg-titre{font-size:13px;font-weight:700;}
.pkg-meta{font-size:9.5px;color:#b0c4e0;}
.pkg-stat{font-size:10px;font-weight:600;color:#f0c040;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.col-head{background:#2c4a6e;color:#fff;padding:4px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-radius:3px 3px 0 0;}
.check-ok{color:#1f7a4a;font-weight:700;}
.check-no{color:#ccc;}
@media print{
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .page{padding:10mm 10mm;}
  .page-header{margin:-10mm -10mm 10px;}
}
`;

  /* ── helper ─────────────────────────────────────────────────────────────── */
  function e(s){ 
    return String(s==null?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  let body = '';

  /* ── PAGE 1 : LISTE DES ACHATS ──────────────────────────────────────────── */
  body += '<div class="page">';
  body += '<div class="page-header"><strong>MAHOLA SCHOOL</strong><span>Liste des achats · Année scolaire '+e(annee)+'</span></div>';
  body += '<h1>Liste consolidée des achats</h1>';
  body += '<p class="sub">'+listeAchats.length+' article(s)&nbsp; · &nbsp;Montant total estimé : <strong>'+fcfa(totalAch)+'</strong></p>';
  body += '<table><thead><tr>'
        + '<th style="width:28px">#</th>'
        + '<th>Article</th>'
        + '<th class="r" style="width:70px">Qté totale</th>'
        + '<th class="r" style="width:90px">Prix unit.</th>'
        + '<th class="r" style="width:100px">Total (FCFA)</th>'
        + '<th style="width:110px">Classes</th>'
        + '</tr></thead><tbody>';

  listeAchats.forEach((a,i)=>{
    const tl = a.prixUnitaire * a.quantiteTotal;
    const classesStr = a.classes.slice(0,3).join(', ') + (a.classes.length>3?' …':'');
    body += '<tr>'
          + '<td class="r" style="color:#999">'+(i+1)+'</td>'
          + '<td>'+e(a.nom)+'</td>'
          + '<td class="r"><strong>'+a.quantiteTotal.toLocaleString('fr-FR')+'</strong></td>'
          + '<td class="r">'+(a.prixUnitaire>0?e(fcfa(a.prixUnitaire)):'<span style="color:#ccc">—</span>')+'</td>'
          + '<td class="r"><strong>'+(tl>0?e(fcfa(tl)):'<span style="color:#ccc">—</span>')+'</strong></td>'
          + '<td style="color:#7a7060;font-size:9px">'+e(classesStr)+'</td>'
          + '</tr>';
  });
  body += '</tbody><tfoot><tr>'
        + '<td colspan="4" class="r">TOTAL GÉNÉRAL</td>'
        + '<td class="r">'+e(fcfa(totalAch))+'</td>'
        + '<td></td></tr></tfoot></table>';
  body += '<div class="page-footer">Famille Bassogog &nbsp;·&nbsp; MAHOLA SCHOOL &nbsp;·&nbsp; Exporté le '+e(dateExport)+'</div>';
  body += '</div>';

  /* ── PAGES SUIVANTES : UNE PAR CLASSE ───────────────────────────────────── */
  packages.forEach(pkg => {
    const nbDist = pkg.enfants.filter(e=>e.distribue).length;
    body += '<div class="page">';
    body += '<div class="page-header"><strong>MAHOLA SCHOOL</strong><span>Distribution &nbsp;·&nbsp; '+e(annee)+'</span></div>';

    body += '<div class="pkg-header">'
          + '<div><span class="pkg-titre">'+e(pkg.label)+'</span>'
          + (pkg.filiere?' <span style="background:rgba(255,255,255,.15);color:#fff;font-size:9px;padding:1px 7px;border-radius:4px;margin-left:6px">'+e(pkg.filiere)+'</span>':'')
          + '</div>'
          + '<div style="text-align:right">'
          + '<div class="pkg-meta">'+pkg.enfants.length+' enfant(s) &nbsp;·&nbsp; '+e(fcfa(pkg.pkgPrice))+' / package</div>'
          + '<div class="pkg-stat">'+nbDist+' / '+pkg.enfants.length+' remis</div>'
          + '</div></div>';

    body += '<div class="two-col">';

    /* Colonne gauche : enfants */
    body += '<div>'
          + '<div class="col-head">Enfants ('+pkg.enfants.length+')</div>'
          + '<table><thead><tr><th>Nom</th><th style="width:50px;text-align:center">Remis</th></tr></thead><tbody>';
    pkg.enfants.forEach(en => {
      body += '<tr>'
            + '<td>'+e(en.nom)+'</td>'
            + '<td style="text-align:center">'
            + (en.distribue ? '<span class="check-ok">✓</span>' : '<span class="check-no">☐</span>')
            + '</td></tr>';
    });
    body += '</tbody></table></div>';

    /* Colonne droite : articles */
    body += '<div>'
          + '<div class="col-head">Articles du package ('+pkg.articles.length+')</div>';
    if(pkg.articles.length){
      body += '<table><thead><tr><th>Article</th><th style="width:30px;text-align:center">Qté</th><th style="width:80px;text-align:right">Prix unit.</th></tr></thead><tbody>';
      pkg.articles.forEach(a => {
        body += '<tr>'
              + '<td>'+e(a.nom)+'</td>'
              + '<td style="text-align:center">'+e(a.quantite||1)+'</td>'
              + '<td style="text-align:right">'+(a.prixUnitaire>0?e(fcfa(a.prixUnitaire)):'—')+'</td>'
              + '</tr>';
      });
      body += '</tbody><tfoot><tr>'
            + '<td colspan="2" class="r">Total package</td>'
            + '<td class="r">'+e(fcfa(pkg.pkgPrice))+'</td>'
            + '</tr></tfoot></table>';
    } else {
      body += '<p style="color:#aaa;font-size:9px;padding:8px">À compléter dans Catalogue &amp; Budget</p>';
    }
    body += '</div>';
    body += '</div>'; // two-col

    body += '<div class="page-footer">Famille Bassogog &nbsp;·&nbsp; MAHOLA SCHOOL &nbsp;·&nbsp; Exporté le '+e(dateExport)+'</div>';
    body += '</div>'; // page
  });

  /* ── Assemblage du document HTML complet ───────────────────────────────── */
  const fullHtml = '<!DOCTYPE html>\n<html lang="fr">\n<head>\n'
    + '<meta charset="UTF-8">\n'
    + '<meta name="viewport" content="width=device-width,initial-scale=1">\n'
    + '<title>MAHOLA SCHOOL — Export PDF '+annee+'</title>\n'
    + '<style>'+css+'</style>\n'
    + '</head>\n<body>\n' + body + '\n</body>\n</html>';

  /* ── Téléchargement via Blob URL ────────────────────────────────────────── */
  const blob = new Blob([fullHtml], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'MAHOLA_SCHOOL_'+new Date().toISOString().slice(0,10)+'.html';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1500);

  /* ── Message d'instruction ──────────────────────────────────────────────── */
  setTimeout(()=>{
    S.modal = {type:'pdfHelp'};
    render();
  }, 400);
}


function doReset(){
  Promise.all([
    fsSet("enfants",ENFANTS_DEFAULT.map(x=>Object.assign({},x))),
    fsSet("catalogue",CATALOGUE_DEFAULT.map(x=>Object.assign({},x))),
    fsSet("prixref",PRIXREF_DEFAULT.map(x=>Object.assign({},x))),
    fsSet("meta",{anneeScolaire:"2026-2027",budgetGlobal:0}),
  ]).then(()=>{
    S.enfants=ENFANTS_DEFAULT.map(x=>Object.assign({},x));
    S.catalogue=CATALOGUE_DEFAULT.map(x=>Object.assign({},x));
    S.prixref=PRIXREF_DEFAULT.map(x=>Object.assign({},x));
    S.meta={anneeScolaire:"2026-2027",budgetGlobal:0};
    render();
  }).catch(e=>{ alert("Erreur lors de la réinitialisation."); console.error(e); });
}

/* ===== INIT ===== */
window.addEventListener("error",ev=>forceDefault("window.error: "+(ev.message||"")));
window.addEventListener("unhandledrejection",ev=>forceDefault("rejection: "+(ev.reason&&ev.reason.message?ev.reason.message:ev.reason)));
try{ boot(); }catch(err){ forceDefault("boot threw: "+(err&&err.message)); }
</script>
